<style>
:root{--rust:#E8461A;--bg:#111010;--surface:#1c1b1b;--surface2:#242323;--border:#333;--text:#f0ebe5;--text2:#a09890;--text3:#6a6260;--green:#4caf7d;--green-bg:#1a2e22;--blue:#4a9eda;--blue-bg:#192232;--amber:#e8a21a;--radius:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--surface);border-bottom:2px solid var(--rust);padding:14px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--rust);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:16px}
h1{font-size:17px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--text)}
.perm-tag{background:#1a1020;border:1px solid #a64ae855;color:#c47ae8;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;font-family:'Share Tech Mono',monospace}
.ro{background:#1a2210;border:1px solid #4caf7d55;color:#4caf7d;font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;font-family:'Share Tech Mono',monospace}
.ts{font-size:11px;color:var(--text3);font-family:'Share Tech Mono',monospace;margin-left:auto}
.stats{display:flex;gap:8px;padding:12px 24px;background:#161515;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 16px;min-width:100px}
.sl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.sv{font-size:20px;font-weight:900;color:var(--rust);font-family:'Share Tech Mono',monospace}
.sv.g{color:var(--green)}.sv.b{color:var(--blue)}
.pw{height:3px;background:var(--surface2)}.pb{height:100%;background:var(--rust);width:0%;transition:width .3s}
.tb{display:flex;gap:8px;padding:12px 24px;flex-wrap:wrap;align-items:center;background:var(--surface);border-bottom:1px solid var(--border)}
.tb input,.tb select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:var(--radius);font-size:13px;height:34px;font-family:'Barlow',sans-serif}
.tb input{flex:1;min-width:160px}.tb input:focus,.tb select:focus{outline:none;border-color:var(--rust)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;padding:20px 24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color .12s,transform .1s}
.card:hover{border-color:var(--rust);transform:translateY(-2px)}
.card img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:var(--surface2)}
.card-ph{width:100%;aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--text3)}
.cb{padding:9px 10px}
.cn{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;color:var(--text)}
.ci{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.cid{font-size:10px;color:var(--text3);font-family:'Share Tech Mono',monospace;margin-bottom:6px}
.cf{display:flex;flex-wrap:wrap;gap:3px}
.badge{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:700}
.bap{background:var(--green-bg);color:var(--green)}.bws{background:var(--blue-bg);color:var(--blue)}.bun{background:#2a2a2a;color:var(--text3)}.bld{background:#2a2710;color:#a09050;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pill{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:700;font-family:'Share Tech Mono',monospace}
.vb{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:var(--radius);font-size:12px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif}
.vb.on{background:var(--rust);border-color:var(--rust);color:#fff}
.tw{padding:0 24px 24px;overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--surface2);color:var(--text2);padding:9px 12px;text-align:left;border-bottom:2px solid var(--rust);font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:700;position:sticky;top:58px}
.tbl td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:hover td{background:var(--surface2)}
.tbl img{width:38px;height:38px;object-fit:cover;border-radius:4px}
.tbl a{color:var(--blue);text-decoration:none;font-size:11px;font-family:'Share Tech Mono',monospace}
.tbl a:hover{text-decoration:underline}
.pgr{text-align:center;padding:12px 24px;font-size:12px;color:var(--text3)}
.lbtn{display:none;margin:0 auto 24px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:8px 24px;border-radius:var(--radius);font-size:13px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif}
footer{text-align:center;padding:16px;color:var(--text3);font-size:11px;border-top:1px solid var(--border);font-family:'Share Tech Mono',monospace}</style>
</head>

const PCOLS  = {"skinbox.cart":"#E8461A","skinbox.example2":"#4caf7d","skinbox.example3":"#4a9eda","skinbox.moderator":"#e8a21a"};
const PLABEL = "skinbox.use";
const TS     = "May 31, 2026";
const WURL   = "https://steam-proxy.rustinction.workers.dev";

// skinData starts with embedded names/images (already loaded in manager)
const skinData = {};
SKINS.forEach(s => {
  skinData[s.id] = { name: s.name, img: s.img, status: s.status || 'loading' };
});

function proxyImg(url) {
  if (!url) return null;
  return 'https://images.weserv.nl/?url=' + encodeURIComponent(url.replace(/^https?:\/\//, '')) + '&w=200&h=200&fit=cover&output=webp';
}

// Refresh any still-loading skins via worker
async function refreshMissing() {
  const missing = SKINS.filter(s => !skinData[s.id]?.name);
  if (!missing.length) { updateStats(); render(); document.getElementById('lst').textContent = SKINS.length + ' skins'; return; }
  if (!WURL) { document.getElementById('lst').textContent = SKINS.length + ' skins (no proxy — open from SkinBox Manager to load images)'; render(); return; }
  const ids = missing.map(s => s.id);
  const CHUNK = 100; let done = 0;
  document.getElementById('lst').textContent = 'Refreshing ' + missing.length + ' skins...';
  for (let i = 0; i < ids.length; i += CHUNK) {
    const chunk = ids.slice(i, i + CHUNK);
    try {
      const p = new URLSearchParams();
      p.append('itemcount', chunk.length);
      chunk.forEach((id, j) => p.append('publishedfileids[' + j + ']', id));
      const r = await fetch(WURL, { method: 'POST', body: p.toString() });
      const json = await r.json();
      for (const f of (json?.response?.publishedfiledetails || [])) {
        const k = String(f.publishedfileid);
        const tags = (f.tags || []).map(t => (t.tag || '').toLowerCase());
        skinData[k] = {
          name: f.title || 'Unnamed',
          img: proxyImg(f.preview_url || null),
          status: f.result === 1 ? (tags.includes('featured') || tags.includes('approved') ? 'Approved' : 'Workshop') : 'Unavailable'
        };
      }
    } catch(e) { console.warn('Fetch error:', e.message); }
    done += chunk.length;
    document.getElementById('pb').style.width = (done / ids.length * 100) + '%';
    updateStats(); render();
    await new Promise(res => setTimeout(res, 200));
  }
  document.getElementById('pb').style.display = 'none';
  document.getElementById('lst').textContent = SKINS.length + ' skins loaded';
}

function updateStats() {
  const vals = Object.values(skinData);
  document.getElementById('sa').textContent = vals.filter(d => d.status === 'Approved').length;
  document.getElementById('sw').textContent = vals.filter(d => d.status === 'Workshop').length;
  document.getElementById('sl2').textContent = vals.filter(d => d.name).length;
}

let PAGE = 80, vis = PAGE, view = 'grid';

function fil() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const g = document.getElementById('fg').value;
  const c = document.getElementById('fc').value;
  const s = document.getElementById('fs').value;
  return SKINS.filter(r => {
    if (g && r.group !== g) return false;
    if (c && r.cat !== c) return false;
    if (s && skinData[r.id]?.status !== s) return false;
    if (q) { const n = (skinData[r.id]?.name || '').toLowerCase(); if (!n.includes(q) && !r.id.includes(q) && !(r.catLabel || '').toLowerCase().includes(q)) return false; }
    return true;
  });
}

function sb(status) {
  if (status === 'Approved') return '<span class="badge bap">&#x2713; Approved</span>';
  if (status === 'Workshop')  return '<span class="badge bws">Workshop</span>';
  if (status === 'Unavailable') return '<span class="badge bun">Unavailable</span>';
  return '<span class="badge bld">Loading...</span>';
}

function pp(perms) {
  return perms.map(p => { const c = PCOLS[p] || '#888'; return '<span class="pill" style="background:' + c + '22;color:' + c + ';border:1px solid ' + c + '44">' + p.replace('skinbox.', '') + '</span>'; }).join('');
}

function render() {
  const list = fil(); const show = list.slice(0, vis);
  if (view === 'grid') {
    const grid = document.getElementById('grid'); grid.innerHTML = '';
    show.forEach(r => {
      const d = skinData[r.id] || {};
      const el = document.createElement('div'); el.className = 'card';
      el.onclick = () => window.open('https://steamcommunity.com/sharedfiles/filedetails/?id=' + r.id, '_blank');
      el.innerHTML = (d.img ? '<img src="' + d.img + '" alt="" loading="lazy">' : '') +
        '<div class="card-ph" style="' + (d.img ? 'display:none' : '') + '">&#x1F5BC;</div>' +
        '<div class="cb"><div class="cn">' + (d.name || '#' + r.id) + '</div>' +
        '<div class="ci">' + r.group + ' &rsaquo; ' + r.catLabel + '</div>' +
        '<div class="cid">#' + r.id + '</div>' +
        '<div class="cf">' + sb(d.status) + pp(r.perms) + '</div></div>';
      grid.appendChild(el);
    });
  } else {
    const tb = document.getElementById('tbody'); tb.innerHTML = '';
    show.forEach(r => {
      const d = skinData[r.id] || {};
      const tr = document.createElement('tr');
      const img = d.img ? '<img src="' + d.img + '" width="38" height="38" style="object-fit:cover;border-radius:4px" loading="lazy" alt="">' : '<div style="width:38px;height:38px;background:var(--surface2);border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--text3)">&#x1F5BC;</div>';
      tr.innerHTML = '<td>' + img + '</td><td><div style="font-weight:700">' + (d.name || '#' + r.id) + '</div></td><td>' + r.catLabel + '</td><td>' + r.group + '</td><td><a href="https://steamcommunity.com/sharedfiles/filedetails/?id=' + r.id + '" target="_blank">#' + r.id + ' &#x2197;</a></td><td>' + sb(d.status) + '</td><td>' + pp(r.perms) + '</td>';
      tb.appendChild(tr);
    });
  }
  document.getElementById('pgr').textContent = 'Showing ' + show.length + ' of ' + list.length + ' skins';
  const lb = document.getElementById('lb');
  if (list.length > vis) { lb.style.display = 'block'; lb.textContent = 'Load ' + Math.min(PAGE, list.length - vis) + ' more'; }
  else lb.style.display = 'none';
}

function more() { vis += PAGE; render(); }
function sv(v) {
  view = v; vis = PAGE;
  document.getElementById('gv').style.display = v === 'grid' ? 'block' : 'none';
  document.getElementById('tv').style.display = v === 'table' ? 'block' : 'none';
  document.getElementById('vg').className = 'vb' + (v === 'grid' ? ' on' : '');
  document.getElementById('vt').className = 'vb' + (v === 'table' ? ' on' : '');
  render();
}

// Initial render with embedded data, then refresh any missing
render();
updateStats();
refreshMissing();
</script>
</body></html>
