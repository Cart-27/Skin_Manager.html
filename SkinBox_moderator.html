*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--surface);border-bottom:2px solid var(--rust);padding:12px 22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:50}

h1{font-size:16px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--text)}
.perm-tag{background:#1a1020;border:1px solid #a64ae855;color:#c47ae8;font-size:10px;font-weight:700;padding:2px 9px;border-radius:99px;font-family:'Share Tech Mono',monospace}
.ro{background:#1a2210;border:1px solid #4caf7d55;color:#4caf7d;font-size:10px;font-weight:700;padding:2px 9px;border-radius:99px;font-family:'Share Tech Mono',monospace}
.ts{font-size:10px;color:var(--text3);font-family:'Share Tech Mono',monospace;margin-left:auto}
.lst{font-size:11px;color:var(--text3)}
.stats{display:flex;gap:8px;padding:10px 22px;background:#161515;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 14px;min-width:90px}
.sl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}

.pw{height:3px;background:var(--surface2)}.pb{height:100%;background:var(--rust);width:0%;transition:width .3s}
.tb{display:flex;gap:8px;padding:10px 22px;flex-wrap:wrap;align-items:center;background:var(--surface);border-bottom:1px solid var(--border)}

.vtog{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.vb{background:none;border:none;border-right:1px solid var(--border);color:var(--text2);padding:0 12px;height:32px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif}

.sf{display:flex;flex-wrap:wrap;gap:3px}

.tbl{width:100%;border-collapse:collapse;font-size:12px}

<script>
const _d   = JSON.parse(document.getElementById('skin-data').textContent);
const SKINS = _d.skins;
const PCOLS = _d.pcols;
const CL    = _d.cl;
const WURL  = _d.wurl;
const skinData = {};
SKINS.forEach(s => { skinData[s.id] = {name:s.name, img:s.img, status:s.status||'loading'}; });

function proxyImg(u){if(!u)return null;if(WURL){return WURL+'?url='+encodeURIComponent(u);}const c=u.replace('https://','').replace('http://','');return 'https://images.weserv.nl/?url='+encodeURIComponent(c)+'&w=200&h=200&fit=cover&output=webp';}

let view='cat', drillCat=null, PAGE=80, vis=PAGE, tvis=PAGE;

async function refresh() {
  const missing = SKINS.filter(s => !skinData[s.id]?.name);
  if (!missing.length || !WURL) {
    document.getElementById('lst').textContent = SKINS.length + ' skins';
    updateStats(); render(); return;
  }
  document.getElementById('lst').textContent = 'Refreshing ' + missing.length + ' skins...';
  const ids = missing.map(s => s.id);
  const CHUNK = 100; let done = 0;
  for (let i = 0; i < ids.length; i += CHUNK) {
    const chunk = ids.slice(i, i + CHUNK);
    try {
      const p = new URLSearchParams();
      p.append('itemcount', chunk.length);
      chunk.forEach((id, j) => p.append('publishedfileids[' + j + ']', id));
      const r = await fetch(WURL, { method: 'POST', body: p.toString() });
      const json = await r.json();
      for (const f of (json?.response?.publishedfiledetails || [])) {
        const k = String(f.publishedfileid);
        const tags = (f.tags || []).map(t => (t.tag || '').toLowerCase());
        skinData[k] = { name:f.title||'Unnamed', img:proxyImg(f.preview_url||null), status:f.result===1?(tags.includes('featured')||tags.includes('approved')?'Approved':'Workshop'):'Unavailable' };
      }
    } catch(e) { console.warn('Fetch error:', e.message); }
    done += chunk.length;
    document.getElementById('pb').style.width = (done/ids.length*100) + '%';
    updateStats(); render();
    await new Promise(res => setTimeout(res, 200));
  }
  document.getElementById('pb').style.display = 'none';
  document.getElementById('lst').textContent = SKINS.length + ' skins loaded';
}

function updateStats() {
  const v = Object.values(skinData);
  document.getElementById('sa').textContent = v.filter(d => d.status==='Approved').length;
  document.getElementById('sw').textContent = v.filter(d => d.status==='Workshop').length;
  document.getElementById('sl2').textContent = v.filter(d => d.name).length;
}

function fil() {
  const q=document.getElementById('search').value.trim().toLowerCase();
  const g=document.getElementById('fg').value;
  const c=document.getElementById('fc').value;
  const s=document.getElementById('fs').value;
  return SKINS.filter(r => {
    if(g&&r.group!==g)return false;
    if(c&&r.cat!==c)return false;
    if(s&&skinData[r.id]?.status!==s)return false;
    if(q){const n=(skinData[r.id]?.name||'').toLowerCase();if(!n.includes(q)&&!r.id.includes(q)&&!(r.catLabel||'').toLowerCase().includes(q))return false;}
    return true;
  });
}

function sb(status) {
  if(status==='Approved')return '<span class="badge bap">&#x2713; Approved</span>';
  if(status==='Workshop')return '<span class="badge bws">Workshop</span>';
  if(status==='Unavailable')return '<span class="badge bun">Unavailable</span>';
  return '<span class="badge bld">Loading...</span>';
}
function pp(perms){return perms.map(p=>{const c=PCOLS[p]||'#888';return '<span class="pill" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+p.replace('skinbox.','')+' </span>';}).join('');}

function makeSC(r) {
  const d=skinData[r.id]||{};
  const el=document.createElement('div');el.className='sc';
  el.onclick=()=>window.open('https://steamcommunity.com/sharedfiles/filedetails/?id='+r.id,'_blank');
  el.innerHTML=(d.img?'<img src="'+d.img+'" alt="" loading="lazy">':'')+'<div class="sc-ph" style="'+(d.img?'display:none':'')+'">&#x1F5BC;</div><div class="sb"><div class="sn">'+(d.name||'#'+r.id)+'</div><div class="si">#'+r.id+'</div><div class="sf">'+sb(d.status)+pp(r.perms)+'</div></div>';
  return el;
}

function renderCat() {
  const cg=document.getElementById('cg'); cg.innerHTML='';
  const byCat={};
  for(const s of SKINS){if(!byCat[s.cat])byCat[s.cat]=[];byCat[s.cat].push(s);}
  const cats=Object.keys(byCat).sort((a,b)=>(CL[a]||a).localeCompare(CL[b]||b));
  for(const cat of cats){
    const cs=byCat[cat];
    const sample=cs.find(s=>skinData[s.id]?.img)||cs[0];
    const img=skinData[sample?.id]?.img;
    const card=document.createElement('div');card.className='cc';
    card.onclick=()=>drillTo(cat);
    card.innerHTML='<span class="cc-count">'+cs.length+'</span>'+(img?'<img src="'+img+'" alt="" loading="lazy">':'<div class="cc-ph">&#x1F5BC;</div>')+'<div class="cc-name">'+(CL[cat]||cat)+'</div><div class="cc-sub">'+(SKINS.find(s=>s.cat===cat)?.group||'')+'</div>';
    cg.appendChild(card);
  }
}

function drillTo(cat) {
  drillCat=cat;
  const cs=SKINS.filter(s=>s.cat===cat);
  document.getElementById('dt').textContent=CL[cat]||cat;
  document.getElementById('ds').textContent=cs.length+' skins';
  const sg=document.getElementById('drill-sg'); sg.innerHTML='';
  cs.forEach(s=>sg.appendChild(makeSC(s)));
  document.getElementById('view-cat').style.display='none';
  document.getElementById('view-drill').style.display='block';
}
function backCat(){drillCat=null;document.getElementById('view-drill').style.display='none';document.getElementById('view-cat').style.display='block';}

function renderGrid() {
  const list=fil();const show=list.slice(0,vis);
  const sg=document.getElementById('sg');sg.innerHTML='';
  show.forEach(s=>sg.appendChild(makeSC(s)));
  document.getElementById('pgr').textContent='Showing '+show.length+' of '+list.length+' skins';
  const lb=document.getElementById('lb');
  if(list.length>vis){lb.style.display='block';lb.textContent='Load '+Math.min(PAGE,list.length-vis)+' more';}
  else lb.style.display='none';
}

function renderTbl() {
  const list=fil();const show=list.slice(0,tvis);
  const tb=document.getElementById('tb');tb.innerHTML='';
  show.forEach(r=>{
    const d=skinData[r.id]||{};
    const tr=document.createElement('tr');
    const img=d.img?'<img src="'+d.img+'" width="36" height="36" style="object-fit:cover;border-radius:4px" loading="lazy">':'<div style="width:36px;height:36px;background:var(--surface2);border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--text3)">&#x1F5BC;</div>';
    tr.innerHTML='<td>'+img+'</td><td><div style="font-weight:700">'+(d.name||'#'+r.id)+'</div></td><td>'+r.catLabel+'</td><td>'+r.group+'</td><td><a href="https://steamcommunity.com/sharedfiles/filedetails/?id='+r.id+'" target="_blank">#'+r.id+' &#x2197;</a></td><td>'+sb(d.status)+'</td><td>'+pp(r.perms)+'</td>';
    tb.appendChild(tr);
  });
  document.getElementById('tpgr').textContent='Showing '+show.length+' of '+list.length+' skins';
  const lb=document.getElementById('tlb');
  if(list.length>tvis){lb.style.display='block';lb.textContent='Load '+Math.min(PAGE,list.length-tvis)+' more';}
  else lb.style.display='none';
}

function render(){
  if(view==='cat'){if(drillCat){document.getElementById('drill-sg').innerHTML='';SKINS.filter(s=>s.cat===drillCat).forEach(s=>document.getElementById('drill-sg').appendChild(makeSC(s)));}else renderCat();}
  else if(view==='grid')renderGrid();
  else renderTbl();
}

function sv(v){
  view=v;vis=PAGE;tvis=PAGE;
  ['cat','drill','grid','tbl'].forEach(n=>{const el=document.getElementById('view-'+(n==='tbl'?'tbl':n));if(el)el.style.display='none';});
  document.getElementById('view-'+v).style.display='block';
  ['cat','grid','tbl'].forEach(n=>document.getElementById('v'+n).className='vb');
  document.getElementById('v'+v).className='vb on';
  render();
}

function onSearch(){if(view==='cat'){view='grid';sv('grid');}else render();}
function onFilter(){if(view==='cat'){view='grid';sv('grid');}else render();}
function more(){vis+=PAGE;renderGrid();}
function tmore(){tvis+=PAGE;renderTbl();}

render();
updateStats();
refresh();
</script>
